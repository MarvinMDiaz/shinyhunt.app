<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Favicons - Google prefers favicon.ico for search results -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#FFD700" />
    
    <!-- Default SEO Meta Tags (can be overridden by react-helmet-async) -->
    <title>ShinyHunt — Pokémon Shiny Hunting Tracker</title>
    <meta name="description" content="Track your Pokémon shiny hunts, reset counters, and build your shiny Pokédex. The ultimate shiny hunting tracker for Pokémon games." />
    <meta name="keywords" content="pokemon shiny hunt tracker, shiny counter, shiny hunting tracker, pokemon reset counter, track shiny pokemon, shiny dex, pokemon shiny tracker, shiny pokemon tracker" />
    <meta name="author" content="ShinyHunt" />
    <meta name="robots" content="index, follow" />
    
    <!-- Default Open Graph Tags -->
    <meta property="og:title" content="ShinyHunt — Pokémon Shiny Hunting Tracker" />
    <meta property="og:description" content="Track shiny hunts, reset counts, and build your shiny Pokédex." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.shinyhunt.app" />
    <meta property="og:image" content="https://www.shinyhunt.app/og-image.png" />
    <meta property="og:site_name" content="ShinyHunt" />
    
    <!-- Default Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ShinyHunt — Pokémon Shiny Tracker" />
    <meta name="twitter:description" content="Track shiny hunts and build your shiny Pokédex" />
    <meta name="twitter:image" content="https://www.shinyhunt.app/og-image.png" />
    
    <!-- Google Search Console Verification -->
    <meta name="google-site-verification" content="mIVHQe5sWLG72_3Z9Kw1X9-DkyO9nioEK5sL0dbeTLE" />
    
    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "ShinyHunt",
      "url": "https://www.shinyhunt.app",
      "description": "Track Pokémon shiny hunts and reset counters. The ultimate shiny hunting tracker for Pokémon games.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://www.shinyhunt.app/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    
    <style>
      /* Ensure favicon displays properly */
      link[rel="icon"] {
        object-fit: contain;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
